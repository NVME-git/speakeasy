<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <!--
    Speakeasy — audience placeholder.

    Stylised silhouettes of a seated audience under a brass spotlight,
    rendered in the project's noir palette. Replace this with an
    appropriate image (Wikimedia Commons "audience" search has good
    public-domain options) by overwriting this file with the same name.
  -->
  <defs>
    <radialGradient id="spot" cx="50%" cy="-10%" r="100%">
      <stop offset="0%"  stop-color="#c9a878" stop-opacity="0.32"/>
      <stop offset="35%" stop-color="#c9a878" stop-opacity="0.06"/>
      <stop offset="80%" stop-color="#0a0805" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a0805"/>
      <stop offset="100%" stop-color="#14100c"/>
    </linearGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2"/>
      <feColorMatrix values="0 0 0 0 0.78
                             0 0 0 0 0.66
                             0 0 0 0 0.47
                             0 0 0 0.06 0"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#floor)"/>
  <rect width="1280" height="720" fill="url(#spot)"/>

  <!-- Horizon line — separates "stage lighting" from the seated rows. -->
  <line x1="0" y1="320" x2="1280" y2="320" stroke="#2c2620" stroke-width="0.5" opacity="0.4"/>

  <!-- Three rows of audience silhouettes. Front row larger / closer. -->
  <g fill="#1d1814">
    <!-- back row -->
    <g transform="translate(0, 380)">
      <ellipse cx="60"   cy="0"  rx="16" ry="22"/>
      <ellipse cx="155"  cy="-3" rx="16" ry="22"/>
      <ellipse cx="250"  cy="0"  rx="16" ry="22"/>
      <ellipse cx="345"  cy="-3" rx="16" ry="22"/>
      <ellipse cx="440"  cy="0"  rx="16" ry="22"/>
      <ellipse cx="535"  cy="-3" rx="16" ry="22"/>
      <ellipse cx="630"  cy="0"  rx="16" ry="22"/>
      <ellipse cx="725"  cy="-3" rx="16" ry="22"/>
      <ellipse cx="820"  cy="0"  rx="16" ry="22"/>
      <ellipse cx="915"  cy="-3" rx="16" ry="22"/>
      <ellipse cx="1010" cy="0"  rx="16" ry="22"/>
      <ellipse cx="1105" cy="-3" rx="16" ry="22"/>
      <ellipse cx="1200" cy="0"  rx="16" ry="22"/>
    </g>
  </g>
  <g fill="#181410">
    <!-- middle row -->
    <g transform="translate(0, 490)">
      <ellipse cx="50"   cy="0"  rx="22" ry="30"/>
      <ellipse cx="160"  cy="-4" rx="22" ry="30"/>
      <ellipse cx="270"  cy="0"  rx="22" ry="30"/>
      <ellipse cx="380"  cy="-4" rx="22" ry="30"/>
      <ellipse cx="490"  cy="0"  rx="22" ry="30"/>
      <ellipse cx="600"  cy="-4" rx="22" ry="30"/>
      <ellipse cx="710"  cy="0"  rx="22" ry="30"/>
      <ellipse cx="820"  cy="-4" rx="22" ry="30"/>
      <ellipse cx="930"  cy="0"  rx="22" ry="30"/>
      <ellipse cx="1040" cy="-4" rx="22" ry="30"/>
      <ellipse cx="1150" cy="0"  rx="22" ry="30"/>
      <ellipse cx="1260" cy="-4" rx="22" ry="30"/>
    </g>
  </g>
  <g fill="#13100c">
    <!-- front row -->
    <g transform="translate(0, 630)">
      <ellipse cx="80"   cy="0"  rx="32" ry="44"/>
      <ellipse cx="220"  cy="-5" rx="32" ry="44"/>
      <ellipse cx="360"  cy="0"  rx="32" ry="44"/>
      <ellipse cx="500"  cy="-5" rx="32" ry="44"/>
      <ellipse cx="640"  cy="0"  rx="32" ry="44"/>
      <ellipse cx="780"  cy="-5" rx="32" ry="44"/>
      <ellipse cx="920"  cy="0"  rx="32" ry="44"/>
      <ellipse cx="1060" cy="-5" rx="32" ry="44"/>
      <ellipse cx="1200" cy="0"  rx="32" ry="44"/>
    </g>
  </g>

  <!-- Brass spotlight beam descending from top. -->
  <g opacity="0.18">
    <path d="M 540 0 L 740 0 L 880 240 L 400 240 Z" fill="#c9a878"/>
  </g>

  <!-- Editorial placeholder label -->
  <text x="640" y="200" text-anchor="middle"
        font-family="Georgia, serif" font-style="italic"
        fill="#8a7c66" font-size="26" letter-spacing="0.04em">
    Imagine an audience.
  </text>
  <text x="640" y="232" text-anchor="middle"
        font-family="ui-monospace, Menlo, monospace"
        fill="#5c5247" font-size="11" letter-spacing="0.28em">
    PLACEHOLDER · REPLACE WITH AN ACTUAL IMAGE
  </text>

  <!-- Subtle grain across the whole image so it doesn't look flat. -->
  <rect width="1280" height="720" filter="url(#grain)" opacity="0.4"/>
</svg>
